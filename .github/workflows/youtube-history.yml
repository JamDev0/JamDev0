name: YouTube watch history

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run youtube-history script
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_SESSION_COOKIES }}
        run: npm run youtube-history

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md youtube-watch-history.md
          git diff --staged --quiet || git commit -m "chore: update YouTube watch history"
          git push
